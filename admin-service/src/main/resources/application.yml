server:
  port: 8083
  forward-headers-strategy: framework

spring:
  application:
    name: admin-service

  boot:
    admin:
      context-path: /admin
      ui:
        public-url: http://localhost:8080/admin/

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always