server:
  port: 8082

spring:
  application:
    name: quantity-measurement-app

  # MySQL Database
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/quantity_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# JWT (same secret as security-service for token validation)
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html